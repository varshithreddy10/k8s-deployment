apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: adminapi-hpa
  namespace: test

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adminapi-deployment

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 1