apiVersion: apps/v1

kind: Deployment

metadata:
  name: authuser

spec:
  replicas: 2

  selector:
    matchLabels:
      app: authuser

  template:

    metadata:
      labels:
        app: authuser

    spec:

      containers:

        - name: authuser

          image: varshithreddy144/authuser:25688501460

          ports:
            - containerPort: 5000