apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ecommerce-ingress
  namespace: default

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:

          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: adminapi-service
                port:
                  number: 80

          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: authuser-service
                port:
                  number: 80

          - path: /cart
            pathType: Prefix
            backend:
              service:
                name: cartapi-service
                port:
                  number: 80

          - path: /customer
            pathType: Prefix
            backend:
              service:
                name: customerapi-service
                port:
                  number: 80

          - path: /order
            pathType: Prefix
            backend:
              service:
                name: orderapi-service
                port:
                  number: 80

          - path: /product
            pathType: Prefix
            backend:
              service:
                name: productapi-service
                port:
                  number: 80