apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ecommerce-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Removed: rewrite-target and use-regex — they were stripping the path

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:

          # =========================
          # ADMIN API  →  /api/admin/**
          # =========================
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: adminapi-service
                port:
                  number: 80

          # =========================
          # AUTH USER API  →  /api/auth/**
          # =========================
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: authuser-service
                port:
                  number: 80

          # =========================
          # CART API  →  /api/carts/**  (plural!)
          # =========================
          - path: /api/carts
            pathType: Prefix
            backend:
              service:
                name: cartapi-service
                port:
                  number: 80

          # =========================
          # CUSTOMER API  →  /api/customer/**
          # =========================
          - path: /api/customer
            pathType: Prefix
            backend:
              service:
                name: customerapi-service
                port:
                  number: 80

          # =========================
          # ADDRESS (also customerapi!)  →  /api/address/**
          # cartapi and orderapi feign clients both call this
          # =========================
          - path: /api/address
            pathType: Prefix
            backend:
              service:
                name: customerapi-service
                port:
                  number: 80

          # =========================
          # ORDER API  →  /api/orders/**  (plural!)
          # =========================
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: orderapi-service
                port:
                  number: 80

          # =========================
          # PRODUCT API  →  /api/products/**  (plural!)
          # =========================
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: productapi-service
                port:
                  number: 80