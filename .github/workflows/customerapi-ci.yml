name: customerapi-ci

on:
  push:
    branches:
      - main

    paths:
      - 'customerapi/**'
      - '.github/workflows/customerapi-ci.yml'


jobs:

  code-quality:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fake Code Quality Check
        run: |
          echo "Checking code quality..."
          sleep 15
          echo "Code quality check completed"

  docker:

    runs-on: ubuntu-latest

    needs: code-quality

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./customerapi
          file: ./customerapi/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/customerapi:${{ github.run_id }}

  update-k8s:

    runs-on: ubuntu-latest

    needs: docker

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes Deployment Manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/customerapi:${{ github.run_id }}|" kubernetes/customerapi/deployment.yml

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add kubernetes/customerapi/deployment.yml

          git commit -m "[CI]: Update customerapi image tag" || echo "No changes to commit"

          git push origin main